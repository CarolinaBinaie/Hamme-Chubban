<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anruf</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Schrift */
body {
    background: #000;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;

    font-family: Arial, Helvetica, sans-serif;
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
}

    <div class="container">

    <div class="caller">

        <div class="number">
            +98 912 <span class="blur">••• ••••</span>
        </div>
/* Anrufer */

.caller {

    text-align: center;

    margin-bottom: 40px;

}

.number {

    color: white;

    font-size: 30px;

    font-weight: 300;

    letter-spacing: 2px;

}

.blur {

    filter: blur(3px);

    opacity: 0.85;

}

.country {

    color: #8c8c8c;

    font-size: 14px;

    margin-top: 10px;

    letter-spacing: 2px;

}
        <div class="country">
            Iran
        </div>

    </div>

    <div class="buttons">

        <img id="answer" class="pulse" src="annehmen.png" alt="Annehmen">

        <img id="hangup" src="auflegen.png" alt="Auflegen">

    </div>

    <div id="status">Bereit für Anruf</div>

    <div id="timer">00:00:00</div>

</div>

/* Buttons */

.buttons {
    display: flex;
    gap: 60px;
}

.buttons img {
    width: 130px;
    height: 130px;
    cursor: pointer;
    transition: transform 0.2s ease;
    user-select: none;
}

.buttons img:hover {
    transform: scale(1.08);
}

.buttons img:active {
    transform: scale(0.92);
}

/* Pulsieren */

.pulse {
    animation: pulse 1.8s infinite;
}

@keyframes pulse {
    0%   { transform: scale(1);   filter: drop-shadow(0 0 0 rgba(0,255,80,0)); }
    50%  { transform: scale(1.05); filter: drop-shadow(0 0 18px rgba(0,255,80,0.35)); }
    100% { transform: scale(1);   filter: drop-shadow(0 0 0 rgba(0,255,80,0)); }
}

/* Text */

#status {
    color: #bbb;
    font-size: 14px;
    text-align: center;
    letter-spacing: 1px;
}

#timer {
    color: #e6e6e6;
    font-size: 26px;
    display: none;
    letter-spacing: 2px;
}

</style>
</head>

<body>

<div class="container">

    <div class="buttons">

        <img id="answer" class="pulse" src="annehmen.png" alt="Annehmen">
        <img id="hangup" src="auflegen.png" alt="Auflegen">

    </div>

    <div id="status">Bereit für Anruf</div>
    <div id="timer">00:00:00</div>

</div>

<audio id="audio" src="audio.mp3"></audio>

<script>

const audio = document.getElementById("audio");
const answer = document.getElementById("answer");
const hangup = document.getElementById("hangup");
const timerEl = document.getElementById("timer");
const statusEl = document.getElementById("status");

let duration = 0;
let remaining = 0;
let interval = null;

/* Format */

function format(sec) {

    let h = Math.floor(sec / 3600);
    let m = Math.floor((sec % 3600) / 60);
    let s = sec % 60;

    return String(h).padStart(2,'0') + ":" +
           String(m).padStart(2,'0') + ":" +
           String(s).padStart(2,'0');
}

/* Countdown */

function startCountdown() {

    clearInterval(interval);

    remaining = Math.floor(duration);

    timerEl.textContent = format(remaining);

    interval = setInterval(() => {

        remaining--;

        if (remaining <= 0) {
            stopCall();
            return;
        }

        timerEl.textContent = format(remaining);

    }, 1000);
}

/* START (RESET immer komplett!) */

function startCall() {

    clearInterval(interval);

    audio.pause();
    audio.currentTime = 0;

    audio.play();

    statusEl.textContent = "Laufender Anruf";
    timerEl.style.display = "block";

    startCountdown();

    answer.classList.remove("pulse");
}

/* STOP */

function stopCall() {

    audio.pause();
    audio.currentTime = 0;

    clearInterval(interval);

    timerEl.style.display = "none";
    statusEl.textContent = "Bereit für Anruf";

    answer.classList.add("pulse");
}

/* Audio Dauer auslesen */

audio.addEventListener("loadedmetadata", () => {
    duration = audio.duration;
    timerEl.textContent = format(duration);
});

/* ANNEHMEN → immer kompletter Neustart */

answer.addEventListener("click", () => {
    setTimeout(() => {
        startCall();
    }, 200);
});

/* AUFLEGEN */

hangup.addEventListener("click", () => {
    stopCall();
});

/* Ende Audio */

audio.addEventListener("ended", () => {
    stopCall();
});

</script>

</body>
</html>
