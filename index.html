<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Startseite</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background-color: #000;
    color: #fff;
    min-height: 100vh;
}

/* Popup */

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.popup {
    background: #111;
    border: 1px solid #444;
    border-radius: 10px;
    padding: 30px;
    width: 90%;
    max-width: 650px;
    text-align: center;
}

.popup h2 {
    font-size: 1.2rem;
    line-height: 1.6;
    margin-bottom: 25px;
}

.popup button {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border: none;
    border-radius: 6px;
    background: #333;
    color: white;
    cursor: pointer;
    font-size: 16px;
    transition: 0.2s;
}

.popup button:hover {
    background: #555;
}

/* Hauptinhalt */

.container {
    padding: 50px 20px;
}

.grid {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    margin-top: 60px;
}

.box {
    width: 250px;
    height: 250px;
    background: #151515;
    border: 1px solid #444;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    text-decoration: none;
    color: white;
    font-size: 18px;
    transition: 0.2s;
}

.box:hover {
    background: #222;
    border-color: #777;
}

.stats {
    margin-top: 70px;
    text-align: center;
}

.stats h3 {
    margin-bottom: 15px;
}

/* Audio Steuerung */

.audio-controls {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
}

.audio-controls button {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 1px solid #444;
    background: #111;
    color: white;
    font-size: 26px;
    cursor: pointer;
    transition: 0.2s;
}

.audio-controls button:hover {
    background: #333;
}
</style>
</head>
<body>

<!-- Popup -->

<div class="overlay" id="popupOverlay">
    <div class="popup">

        <h2>
            Hiermit nehme ich zur Kenntnis,
            dass alles was ich tue und tun werde
            staatlich überwacht wird.
        </h2>

        <button onclick="confirmChoice('zustimmung')">
            Ich bestätige, da ich zustimme.
        </button>

        <button onclick="confirmChoice('keine_option')">
            Ich bestätige, weil es keine andere Option gibt.
        </button>

    </div>
</div>

<!-- Audio -->

<audio id="backgroundAudio" loop>
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<!-- Hauptseite -->

<div class="container">

    <div class="grid">

        <a href="#" class="box">
            Link zur offiziellen Webseite
        </a>

        <a href="#" class="box">
            Informationen erhalten
        </a>

        <a href="#" class="box">
            Persönliche Meinung preisgeben
        </a>

    </div>

    <div class="stats">
        <h3>Dokumentierte Auswahl</h3>

        <p>
            Zustimmung:
            <span id="count1">0</span>
        </p>

        <p>
            Keine andere Option:
            <span id="count2">0</span>
        </p>
    </div>

</div>

<!-- Audio Buttons -->

<div class="audio-controls">

    <!-- Audio starten / neu starten -->
    <button id="playBtn" title="Audio starten">
        📞
    </button>

    <!-- Audio stoppen -->
    <button id="stopBtn" title="Audio stoppen">
        ☎️
    </button>

</div>

<script>

const audio = document.getElementById("backgroundAudio");

/* Statistik laden */

function loadStats() {

    let zustimmung =
        parseInt(localStorage.getItem("zustimmung")) || 0;

    let keineOption =
        parseInt(localStorage.getItem("keine_option")) || 0;

    document.getElementById("count1").textContent =
        zustimmung;

    document.getElementById("count2").textContent =
        keineOption;
}

/* Popup bestätigen */

function confirmChoice(choice) {

    let current =
        parseInt(localStorage.getItem(choice)) || 0;

    localStorage.setItem(
        choice,
        current + 1
    );

    document.getElementById("popupOverlay").style.display =
        "none";

    loadStats();

    audio.play().catch(error => {
        console.log("Audio konnte nicht gestartet werden:", error);
    });
}

/* Audio neu starten */

document.getElementById("playBtn")
.addEventListener("click", () => {

    audio.currentTime = 0;
    audio.play();

});

/* Audio stoppen */

document.getElementById("stopBtn")
.addEventListener("click", () => {

    audio.pause();
    audio.currentTime = 0;

});

/* Statistik beim Laden anzeigen */

window.onload = () => {
    loadStats();
};

</script>

</body>
</html>
