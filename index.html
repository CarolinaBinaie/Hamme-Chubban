<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Startseite</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #000;
    color: #fff;
    min-height: 100vh;
}

/* POPUP */

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.popup {
    width: 90%;
    max-width: 650px;
    background: #111;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 35px;
    text-align: center;
}

.popup h2 {
    font-size: 1.2rem;
    line-height: 1.6;
    margin-bottom: 25px;
}

.popup button {
    width: 100%;
    margin-top: 12px;
    padding: 15px;
    border: none;
    border-radius: 8px;
    background: #333;
    color: white;
    cursor: pointer;
    font-size: 16px;
    transition: 0.2s;
}

.popup button:hover {
    background: #555;
}

/* HOMEPAGE */

.container {
    min-height: 100vh;

    display: flex;
    flex-direction: column;

    justify-content: center;
    align-items: center;

    gap: 40px;
}

/* TELEFON BUTTONS */

.audio-controls {
    display: flex;
    gap: 40px;
}

.audio-controls button {

    width: 120px;
    height: 120px;

    border-radius: 50%;

    border: 2px solid #5f7354;

    background: #3f4f37;

    color: white;

    font-size: 50px;

    cursor: pointer;

    transition: all 0.25s ease;
}

.audio-controls button:hover {

    background: #556a4b;

    transform: scale(1.08);
}

/* STATISTIK */

.stats {
    text-align: center;
    color: #bfbfbf;
}

.stats h3 {
    margin-bottom: 15px;
    font-weight: normal;
}

.stats p {
    margin: 5px 0;
}

</style>
</head>
<body>

<!-- POPUP -->

<div class="overlay" id="popupOverlay">

    <div class="popup">

        <h2>
            Hiermit nehme ich zur Kenntnis,
            dass alles was ich tue und tun werde
            staatlich überwacht wird.
        </h2>

        <button onclick="confirmChoice('zustimmung')">
            Ich bestätige, da ich zustimme.
        </button>

        <button onclick="confirmChoice('keine_option')">
            Ich bestätige, weil es keine andere Option gibt.
        </button>

    </div>

</div>

<!-- AUDIO -->

<audio id="backgroundAudio" loop>
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<!-- HOMEPAGE -->

<div class="container">

    <div class="audio-controls">

        <button id="playBtn" title="Audio starten oder neu starten">
            📞
        </button>

        <button id="stopBtn" title="Audio stoppen">
            ☎️
        </button>

    </div>

    <div class="stats">

        <h3>Dokumentierte Auswahl</h3>

        <p>
            Zustimmung:
            <span id="count1">0</span>
        </p>

        <p>
            Keine andere Option:
            <span id="count2">0</span>
        </p>

    </div>

</div>

<script>

const audio = document.getElementById("backgroundAudio");

/* Statistik laden */

function loadStats() {

    const zustimmung =
        parseInt(localStorage.getItem("zustimmung")) || 0;

    const keineOption =
        parseInt(localStorage.getItem("keine_option")) || 0;

    document.getElementById("count1").textContent =
        zustimmung;

    document.getElementById("count2").textContent =
        keineOption;
}

/* Popup bestätigen */

function confirmChoice(choice) {

    let current =
        parseInt(localStorage.getItem(choice)) || 0;

    localStorage.setItem(
        choice,
        current + 1
    );

    document.getElementById("popupOverlay").style.display =
        "none";

    loadStats();

    audio.play().catch(error => {
        console.log(error);
    });
}

/* Audio starten / neu starten */

document
.getElementById("playBtn")
.addEventListener("click", () => {

    audio.currentTime = 0;
    audio.play();

});

/* Audio stoppen */

document
.getElementById("stopBtn")
.addEventListener("click", () => {

    audio.pause();
    audio.currentTime = 0;

});

/* Statistik laden */

window.onload = () => {

    loadStats();

};

</script>

</body>
</html>
