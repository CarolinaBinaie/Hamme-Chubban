<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anruf</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #000;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Layout */

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
}

/* Buttons */

.buttons {
    display: flex;
    gap: 60px;
    align-items: center;
}

/* Grundstyle */

.buttons img {
    width: 130px;
    height: 130px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    user-select: none;
}

/* Hover */

.buttons img:hover {
    transform: scale(1.08);
}

/* Klick-Feedback (0.2s Verzögerung Effekt) */

.buttons img:active {
    transform: scale(0.92);
}

/* Pulsieren (nur grüner Button) */

.pulse {
    animation: pulse 1.8s infinite;
}

@keyframes pulse {
    0%   { transform: scale(1);   filter: drop-shadow(0 0 0 rgba(0,255,80,0)); }
    50%  { transform: scale(1.05); filter: drop-shadow(0 0 18px rgba(0,255,80,0.35)); }
    100% { transform: scale(1);   filter: drop-shadow(0 0 0 rgba(0,255,80,0)); }
}

/* Text */

#status {
    color: #aaa;
    font-size: 16px;
    text-align: center;
}

#timer {
    color: #ddd;
    font-size: 22px;
    letter-spacing: 1px;
    display: none;
}

</style>
</head>

<body>

<div class="container">

    <div class="buttons">

        <img id="answer" class="pulse" src="annehmen.png" alt="Annehmen">
        <img id="hangup" src="auflegen.png" alt="Auflegen">

    </div>

    <div id="status">Bereit für Anruf</div>
    <div id="timer">00:00:00</div>

</div>

<audio id="audio" src="audio.mp3"></audio>

<script>

const audio = document.getElementById("audio");
const answer = document.getElementById("answer");
const hangup = document.getElementById("hangup");
const timerEl = document.getElementById("timer");
const statusEl = document.getElementById("status");

let duration = 0;
let remaining = 0;
let interval = null;

/* Format */

function format(sec) {
    let h = Math.floor(sec / 3600);
    let m = Math.floor((sec % 3600) / 60);
    let s = sec % 60;

    return String(h).padStart(2,'0') + ":" +
           String(m).padStart(2,'0') + ":" +
           String(s).padStart(2,'0');
}

/* Timer runterzählen */

function startCountdown() {

    clearInterval(interval);

    remaining = Math.floor(duration);

    timerEl.textContent = format(remaining);

    interval = setInterval(() => {

        remaining--;

        if (remaining <= 0) {
            stopCall();
            return;
        }

        timerEl.textContent = format(remaining);

    }, 1000);
}

/* Start */

function startCall() {

    statusEl.textContent = "Laufender Anruf";
    timerEl.style.display = "block";

    audio.currentTime = 0;
    audio.play();

    startCountdown();

    answer.classList.remove("pulse");
}

/* Stop */

function stopCall() {

    audio.pause();
    audio.currentTime = 0;

    clearInterval(interval);

    timerEl.style.display = "none";
    statusEl.textContent = "Bereit für Anruf";

    answer.classList.add("pulse");
}

/* AUDIO LOADED -> Dauer auslesen */

audio.addEventListener("loadedmetadata", () => {
    duration = audio.duration;
    timerEl.textContent = format(duration);
});

/* ANNEHMEN (mit 0.2s Delay) */

answer.addEventListener("click", () => {

    setTimeout(() => {
        startCall();
    }, 200);

});

/* AUFLEGEN */

hangup.addEventListener("click", () => {
    stopCall();
});

/* wenn Audio endet */

audio.addEventListener("ended", () => {
    stopCall();
});

</script>

</body>
</html>
