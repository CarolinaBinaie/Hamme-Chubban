<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anruf</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#000;

font-family:Arial,Helvetica,sans-serif;

width:100vw;
height:100vh;

display:flex;

justify-content:center;
align-items:center;

overflow:hidden;

color:white;

}

.container{

display:flex;
flex-direction:column;

align-items:center;
justify-content:center;

}

.caller{

text-align:center;

margin-bottom:45px;

}

.number{

font-size:30px;

letter-spacing:2px;

font-weight:300;

}

.blur{

filter:blur(3px);

opacity:.85;

}

.country{

margin-top:10px;

font-size:14px;

color:#8b8b8b;

letter-spacing:2px;

}

.buttons{

display:flex;

gap:70px;

margin-bottom:25px;

}

.buttons img{

width:140px;

cursor:pointer;

transition:.2s;

user-select:none;

}

.buttons img:hover{

transform:scale(1.07);

}

.buttons img:active{

transform:scale(.92);

}

.pulse{

animation:pulse 1.8s infinite;

}

@keyframes pulse{

0%{

transform:scale(1);

}

50%{

transform:scale(1.05);

filter:drop-shadow(0 0 20px rgba(0,255,0,.35));

}

100%{

transform:scale(1);

}

}

#status{

font-size:14px;

color:#a7a7a7;

margin-top:5px;

}

#timer{

display:none;

margin-top:10px;

font-size:22px;

letter-spacing:2px;

color:white;

}

</style>

</head>

<body>

<div class="container">

<div class="caller">

<div class="number">

+98 912 <span class="blur">••• ••••</span>

</div>

<div class="country">

Iran

</div>

</div>

<div class="buttons">

<img
id="answer"
class="pulse"
src="annehmen.png"
alt="Annehmen">

<img
id="hangup"
src="auflegen.png"
alt="Auflegen">

</div>

<div id="status">

Bereit für Anruf

</div>

<div id="timer">

00:00:00

</div>

</div>

<audio id="audio">

<source src="audio.mp3" type="audio/mpeg">

</audio>

<script>

const audio=document.getElementById("audio");

const answer=document.getElementById("answer");

const hangup=document.getElementById("hangup");

const status=document.getElementById("status");

const timer=document.getElementById("timer");

let duration=0;

let remaining=0;

let interval=null;

function format(sec){

let h=Math.floor(sec/3600);

let m=Math.floor((sec%3600)/60);

let s=sec%60;

return String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");

}

audio.addEventListener("loadedmetadata",()=>{

duration=Math.floor(audio.duration);

timer.innerHTML=format(duration);

});

    
function stopCall(){

audio.pause();

audio.currentTime=0;

clearInterval(interval);

timer.style.display="none";

status.innerHTML="Bereit für Anruf";

answer.classList.add("pulse");

}

function startCountdown(){

clearInterval(interval);

remaining=duration;

timer.innerHTML=format(remaining);

interval=setInterval(()=>{

remaining--;

timer.innerHTML=format(remaining);

if(remaining<=0){

stopCall();

}

},1000);

}

function startCall(){

clearInterval(interval);

audio.pause();

audio.currentTime=0;

/* Anzeige */

status.innerHTML="Laufender Anruf";

timer.style.display="block";

/* Timer immer komplett neu */

startCountdown();

/* Audio immer komplett neu */

audio.play();

answer.classList.remove("pulse");

}

/* Annehmen */

answer.addEventListener("click",()=>{

setTimeout(()=>{

startCall();

},200);

});

/* Auflegen */

hangup.addEventListener("click",()=>{

stopCall();

});

/* Audio beendet */

audio.addEventListener("ended",()=>{

stopCall();

});

</script>

</body>

</html>
