<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Startseite</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background-color: #000;
        color: white;
        min-height: 100vh;
    }

    /* Popup Overlay */
    .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.85);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }

    .popup {
        background: #111;
        border: 1px solid #444;
        padding: 30px;
        width: 90%;
        max-width: 600px;
        text-align: center;
        border-radius: 10px;
    }

    .popup h2 {
        margin-bottom: 25px;
        font-size: 1.2rem;
        line-height: 1.5;
    }

    .popup button {
        display: block;
        width: 100%;
        margin: 10px 0;
        padding: 15px;
        border: none;
        cursor: pointer;
        background: #333;
        color: white;
        border-radius: 6px;
        transition: 0.2s;
    }

    .popup button:hover {
        background: #555;
    }

    /* Hauptinhalt */
    .container {
        padding: 50px 20px;
    }

    .grid {
        display: flex;
        justify-content: center;
        gap: 30px;
        flex-wrap: wrap;
        margin-top: 50px;
    }

    .box {
        width: 250px;
        height: 250px;
        background: #1a1a1a;
        border: 1px solid #444;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        text-decoration: none;
        color: white;
        font-size: 18px;
        transition: 0.2s;
    }

    .box:hover {
        background: #2a2a2a;
    }

    .stats {
        margin-top: 60px;
        text-align: center;
        font-size: 18px;
    }
</style>
</head>
<body>

<!-- Popup -->
<div class="overlay" id="popupOverlay">
    <div class="popup">
        <h2>
            Hiermit nehme ich zur Kenntnis, dass alles was ich tue und tun werde staatlich überwacht wird.
        </h2>

        <button onclick="confirmChoice('zustimmung')">
            Ich bestätige, da ich zustimme.
        </button>

        <button onclick="confirmChoice('keine_option')">
            Ich bestätige, weil es keine andere Option gibt.
        </button>
    </div>
</div>

<!-- Hauptseite -->
<div class="container">

    <div class="grid">

        <a href="#" class="box">
            Link zur offiziellen Webseite
        </a>

        <a href="#" class="box">
            Informationen erhalten
        </a>

        <a href="#" class="box">
            Persönliche Meinung preisgeben
        </a>

    </div>

    <div class="stats">
        <h3>Dokumentierte Auswahl</h3>
        <p>Zustimmung: <span id="count1">0</span></p>
        <p>Keine andere Option: <span id="count2">0</span></p>
    </div>

</div>

<script>
    function loadStats() {
        let zustimmung =
            parseInt(localStorage.getItem("zustimmung")) || 0;

        let keineOption =
            parseInt(localStorage.getItem("keine_option")) || 0;

        document.getElementById("count1").textContent = zustimmung;
        document.getElementById("count2").textContent = keineOption;
    }

    function confirmChoice(choice) {

        let current =
            parseInt(localStorage.getItem(choice)) || 0;

        localStorage.setItem(choice, current + 1);

        document.getElementById("popupOverlay").style.display = "none";

        loadStats();
    }

    window.onload = function() {
        loadStats();
    };
</script>

</body>
</html>
